<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mastermind - Logic 80's</title>
    <base href="/mastermind-game/" />
    <style>
        html, body {
            height: 100vh;
            margin: 0;
            background: #0a0a1a;
            color: #e0e0e0;
            overflow: hidden;
            font-family: 'Courier New', 'Lucida Console', Consolas, monospace;
        }

        #app {
            min-height: 100vh;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
            text-align: center;
            transition: opacity .2s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
        }

        .loading-text {
            color: #888;
            letter-spacing: 4px;
            font-size: .9rem;
            text-transform: uppercase;
        }
    </style>
    <link href="css/site.css" rel="stylesheet" />
</head>
<body>
    <audio id="bgMusic" src="audio/background.mp3" loop preload="auto"></audio>
    <div id="app">
        <div class="loading-screen">
            <p class="loading-text">Mastermind Loading...</p>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        function removeLoadingScreen() {
            var app = document.getElementById('app');
            if (!app) return;

            var loading = app.querySelector('.loading-screen');
            if (loading) {
                loading.classList.add('fade-out');
                setTimeout(function () {
                    loading.remove();
                }, 200);
            }
        }

        function forceInitialRepaint() {
            requestAnimationFrame(function () {
                void document.body.offsetHeight;
                requestAnimationFrame(function () {
                    void document.documentElement.offsetHeight;
                });
            });
        }

        window.audioControl = {
            _ctx: null,
            _gain: null,
            _connected: false,
            _stopTimeout: null,

            _init: function () {
                if (this._ctx) return;
                var AC = window.AudioContext || window.webkitAudioContext;
                this._ctx = new AC();
                this._gain = this._ctx.createGain();
                this._gain.gain.value = 0;
                this._gain.connect(this._ctx.destination);
            },

            _connect: function () {
                if (this._connected) return;
                this._init();
                var a = document.getElementById('bgMusic');
                if (!a) return;
                var src = this._ctx.createMediaElementSource(a);
                src.connect(this._gain);
                this._connected = true;
            },

            fadeIn: function (durationMs) {
                this._connect();
                var a = document.getElementById('bgMusic');
                if (!a) return;

                if (this._stopTimeout) {
                    clearTimeout(this._stopTimeout);
                    this._stopTimeout = null;
                }

                if (this._ctx.state === 'suspended') {
                    this._ctx.resume();
                }

                var dur = (durationMs || 3000) / 1000;
                var now = this._ctx.currentTime;

                this._gain.gain.cancelScheduledValues(now);

                if (a.paused) {
                    a.currentTime = 0;
                    this._gain.gain.setValueAtTime(0, now);
                    a.play().catch(function () { });
                } else {
                    this._gain.gain.setValueAtTime(this._gain.gain.value, now);
                }

                this._gain.gain.linearRampToValueAtTime(1.0, now + dur);
            },

            fadeOut: function (durationMs) {
                if (!this._ctx || !this._connected) return;
                var a = document.getElementById('bgMusic');
                if (!a || a.paused) return;

                if (this._stopTimeout) {
                    clearTimeout(this._stopTimeout);
                    this._stopTimeout = null;
                }

                var dur = (durationMs || 1000) / 1000;
                var now = this._ctx.currentTime;

                this._gain.gain.cancelScheduledValues(now);
                this._gain.gain.setValueAtTime(this._gain.gain.value, now);
                this._gain.gain.linearRampToValueAtTime(0, now + dur);

                var ms = durationMs || 1000;
                this._stopTimeout = setTimeout(function () {
                    a.pause();
                    a.currentTime = 0;
                }, ms + 50);
            }
        };

        Blazor.start()
            .then(function () {
                removeLoadingScreen();
                forceInitialRepaint();
            });
    </script>
</body>
</html>
