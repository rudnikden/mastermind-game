<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mastermind - Logic 80's</title>
    <base href="/mastermind-game/" />
    <link href="css/site.css" rel="stylesheet" />
</head>
<body>
    <audio id="bgMusic" src="audio/background.mp3" loop preload="auto"></audio>
    <div id="app">
        <div class="loading-screen">
            <p class="loading-title">MASTERMIND</p>
            <p class="loading-sub">Loading...</p>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.audioControl = {
            _ctx: null,
            _gain: null,
            _connected: false,
            _stopTimeout: null,

            _init: function () {
                if (this._ctx) return;
                var AC = window.AudioContext || window.webkitAudioContext;
                this._ctx = new AC();
                this._gain = this._ctx.createGain();
                this._gain.gain.value = 0;
                this._gain.connect(this._ctx.destination);
            },

            _connect: function () {
                if (this._connected) return;
                this._init();
                var a = document.getElementById('bgMusic');
                if (!a) return;
                var src = this._ctx.createMediaElementSource(a);
                src.connect(this._gain);
                this._connected = true;
            },

            fadeIn: function (durationMs) {
                this._connect();
                var a = document.getElementById('bgMusic');
                if (!a) return;

                if (this._stopTimeout) {
                    clearTimeout(this._stopTimeout);
                    this._stopTimeout = null;
                }

                if (this._ctx.state === 'suspended') {
                    this._ctx.resume();
                }

                var dur = (durationMs || 3000) / 1000;
                var now = this._ctx.currentTime;

                this._gain.gain.cancelScheduledValues(now);

                if (a.paused) {
                    a.currentTime = 0;
                    this._gain.gain.setValueAtTime(0, now);
                    a.play().catch(function () { });
                } else {
                    this._gain.gain.setValueAtTime(this._gain.gain.value, now);
                }

                this._gain.gain.linearRampToValueAtTime(1.0, now + dur);
            },

            fadeOut: function (durationMs) {
                if (!this._ctx || !this._connected) return;
                var a = document.getElementById('bgMusic');
                if (!a || a.paused) return;

                if (this._stopTimeout) {
                    clearTimeout(this._stopTimeout);
                    this._stopTimeout = null;
                }

                var dur = (durationMs || 1000) / 1000;
                var now = this._ctx.currentTime;

                this._gain.gain.cancelScheduledValues(now);
                this._gain.gain.setValueAtTime(this._gain.gain.value, now);
                this._gain.gain.linearRampToValueAtTime(0, now + dur);

                var ms = durationMs || 1000;
                this._stopTimeout = setTimeout(function () {
                    a.pause();
                    a.currentTime = 0;
                }, ms + 50);
            }
        };
    </script>
</body>
</html>
